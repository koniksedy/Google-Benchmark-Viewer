<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Benchmark viewer</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div id="app">
    <header>
      <h1>Benchmark <span>Viewer</span></h1>
      <div id="meta-wrap">
        <div id="meta">Drop a bench_results.json to begin.</div>
        <div id="meta-actions">
          <button id="new-view-btn" class="file-btn" title="Start a new benchmark view" style="display:none">New
            benchmark</button>
          <button id="compare-btn" class="file-btn" title="Load compare benchmark JSON" disabled
            style="display:none">Compare</button>
          <input type="file" id="compare-file-input" accept=".json" hidden>
          <button id="theme-toggle" class="file-btn" aria-pressed="false" title="Toggle light / dark theme">🌙
            Dark</button>
        </div>
      </div>
    </header>

    <div id="drop-zone">
      <p>Drop <strong>bench_results.json</strong> here, or click to browse</p>
      <p class="hint">Any Google Benchmark JSON (use <code>--benchmark_format=json</code> to generate)</p>
      <button onclick="document.getElementById('file-input').click()">Choose file</button>
      <input type="file" id="file-input" accept=".json">
    </div>

    <div id="content">
      <div class="summary-grid" id="summary"></div>
      <div class="tab-bar" id="tabs"></div>
      <div id="panels"></div>
    </div>

    <script type="module" src="js/main.js"></script>
  </div>
</body>
</html>
